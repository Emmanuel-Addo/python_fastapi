name: FastAPI CI/CD

on:
  push:
    branches:
      - python_fastapi_2
  pull_request:
    branches:
      - python_fastapi_2

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Check app imports
        run: uv run python -c "import main; print('Import OK')"

  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/python_fastapi_2' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "Add your deploy commands here (e.g. Railway, Render, AWS)"